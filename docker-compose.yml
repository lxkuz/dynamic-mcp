services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  parser_sandbox:
    build:
      context: .
      dockerfile: docker/parser-sandbox/Dockerfile
    image: dynamic-mcp-parser-sandbox:latest
    profiles:
      - build-only

  # Миграции SQLite (books, sections, pages, active_storage)
  web_migrate:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - app_storage:/rails/storage
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-please-set-secret-key-base}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379/0
    command:
      - sh
      - -c
      - |
        set -e
        echo "[web_migrate] Running rails db:prepare..."
        ./bin/rails db:prepare 2>&1 || { echo "[web_migrate] FAILED with exit $?"; exit 1; }
        echo "[web_migrate] Done."
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      web_migrate:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-please-set-secret-key-base}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379/0
      - RAILS_LOG_LEVEL=${RAILS_LOG_LEVEL:-info}
      - PUBLIC_HOST=${PUBLIC_HOST:-localhost}
      - PUBLIC_SCHEME=${PUBLIC_SCHEME:-http}
      - WEB_PORT=${WEB_PORT:-3020}
      - AI_IMPORT_ENABLED=${AI_IMPORT_ENABLED:-true}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - PARSER_SANDBOX_IMAGE=dynamic-mcp-parser-sandbox:latest
    volumes:
      - app_storage:/rails/storage
    ports:
      - "${WEB_PORT:-3020}:3000"
    command: ["./bin/rails", "server", "-b", "0.0.0.0", "-p", "3000"]

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      web_migrate:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-please-set-secret-key-base}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379/0
      - RAILS_LOG_LEVEL=${RAILS_LOG_LEVEL:-info}
      - AI_IMPORT_ENABLED=${AI_IMPORT_ENABLED:-true}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - PARSER_SANDBOX_IMAGE=dynamic-mcp-parser-sandbox:latest
      - BOOK_IMPORT_WORKDIR=/rails/tmp/book-import
      - BOOK_IMPORT_HOST_WORKDIR=${BOOK_IMPORT_HOST_WORKDIR:-}
    volumes:
      - app_storage:/rails/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BOOK_IMPORT_HOST_WORKDIR:-./tmp/book-import}:/rails/tmp/book-import
    user: root
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  # Elasticsearch: только внутри сети compose (http://elasticsearch:9200).
  # При смене major-версии: docker-compose down && docker volume rm dynamic-mcp_es_data
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
      - action.auto_create_index=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  app_storage:
  es_data:
  redis_data:
